<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AIハングマン</title>

  <!-- 安定版PyScript -->
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

</head>
<body>
  <h1>AIハングマンゲーム</h1>

  <button id="start-btn">ゲーム開始</button>

  <div style="margin-top: 1em;">
    <p id="word-display">単語: </p>

    <input type="text" id="guess-input" maxlength="1" placeholder="1文字入力">
    <button id="guess-btn">送信</button>

    <p id="message"></p>
    <pre id="hangman-stage"></pre>
  </div>

<script type="py">
from js import document
import random

word_list = ["python", "hangman", "element", "adventure", "magic", "cloud", "stream"]

stages = [
    "",
    "________",
    "|",
    "|   |",
    "|   0",
    "|  /|\\",
    "|  / \\",
]

word = ""
board = []
wrong = 0
guessed = []
game_over = True


def start_game(event=None):
    global word, board, wrong, guessed, game_over

    word = random.choice(word_list)
    board = ["_"] * len(word)
    wrong = 0
    guessed = []
    game_over = False

    document.getElementById("word-display").innerText = "単語: " + " ".join(board)
    document.getElementById("message").innerText = "1文字ずつ当ててみてね！"
    document.getElementById("hangman-stage").innerText = ""
    document.getElementById("guess-input").value = ""


def guess_letter(event=None):
    global wrong, game_over

    if game_over:
        return

    char = document.getElementById("guess-input").value.lower()
    document.getElementById("guess-input").value = ""

    if not char or len(char) != 1 or not char.isalpha():
        document.getElementById("message").innerText = "アルファベット1文字だけ入力してね！"
        return

    if char in guessed:
        document.getElementById("message").innerText = "その文字はもう使ったよ！"
        return

    guessed.append(char)

    if char in word:
        for i, c in enumerate(word):
            if c == char:
                board[i] = char
        document.getElementById("message").innerText = f"{char} は正解！"
    else:
        wrong += 1
        document.getElementById("message").innerText = f"{char} は不正解！"

    document.getElementById("word-display").innerText = "単語: " + " ".join(board)
    document.getElementById("hangman-stage").innerText = "\n".join(stages[:wrong + 1])

    if "_" not in board:
        document.getElementById("message").innerText = "🎉 勝ったよ！"
        game_over = True
    elif wrong >= len(stages) - 1:
        document.getElementById("message").innerText = f"💀 ゲームオーバー！正解は「{word}」"
        game_over = True


# イベント登録（重要：少し遅らせる）
import asyncio

async def setup():
    await asyncio.sleep(0.1)
    document.getElementById("start-btn").addEventListener("click", start_game)
    document.getElementById("guess-btn").addEventListener("click", guess_letter)

asyncio.create_task(setup())
</script>

</body>
</html>
