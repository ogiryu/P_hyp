<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ハングマン</title>
  <link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
  <script defer src="https://pyscript.net/latest/pyscript.js"></script>
</head>
<body>
  <h1>ハングマンゲーム</h1>

  <button id="start-btn">ゲーム開始</button>

  <div id="game-area" style="margin-top: 1em;">
    <p id="word-display">単語: </p>
    <input type="text" id="guess-input" maxlength="1" placeholder="1文字入力">
    <button id="guess-btn">送信</button>
    <p id="message"></p>
    <pre id="hangman-stage"></pre>
  </div>

  <!-- 外部Pythonファイルを読み込む -->
  <py-script src="hangman.py"></py-script>
</body>
</html>
