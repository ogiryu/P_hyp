<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Ryuu Lab</title>

<style>

body{
    font-family: sans-serif;
    background:#111;
    color:white;
    text-align:center;
    margin:0;
}

header{
    background:#222;
    padding:20px;
    font-size:30px;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    background:#2c2c2c;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    background:cyan;
    cursor:pointer;
}

button:hover{
    background:#00aaaa;
}

footer{
    margin-top:40px;
    padding:20px;
    background:#222;
}

</style>
</head>

<body>

<header>
Ryuu Lab
</header>

<h2>実験ページ</h2>

<div class="container">

<div class="card">
<h3>自己紹介</h3>
<p>情報系大学生。Pythonと数学が好き。</p>
</div>

<div class="card">
<h3>ボタン実験</h3>
<button onclick="changeText()">押してみる</button>
<p id="demo">ここが変わる</p>
</div>

<div class="card">
<h3>リンク</h3>
<a href="https://github.com" target="_blank">GitHub</a>
</div>

</div>

<footer>
Ryuu Web Experiment
</footer>

<script>

function changeText(){
    document.getElementById("demo").innerText="ボタンが押された！";
}

</script>

</body>
</html>
